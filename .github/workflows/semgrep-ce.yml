name: Semgrep CE Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Python Code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Run Semgrep CE
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/python"        # free open-source Python ruleset
          generateSarif: "1"        # tells Semgrep to output SARIF format
        env:
          SEMGREP_APP_TOKEN: ""     # intentionally empty — CE needs no token

      - name: Record end time and calculate duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Semgrep CE pipeline duration: $DURATION seconds"

      - name: Upload SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ce-results
          path: semgrep.sarif
