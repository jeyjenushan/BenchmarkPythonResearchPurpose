name: Semgrep CE Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Python Code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Record start time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep CE
        # continue-on-error prevents job failing when findings exist
        continue-on-error: true
        run: |
          semgrep scan \
            --config "p/python" \
            --sarif \
            --output semgrep.sarif \
            --metrics=off

      - name: Record end time and calculate duration
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "Semgrep CE pipeline duration: $DURATION seconds"

      - name: Upload SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-ce-results
          path: semgrep.sarif
